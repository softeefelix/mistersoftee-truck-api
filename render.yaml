services:
  - type: web
    name: mistersoftee-truck-locations
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: GEOTAB_USERNAME
        sync: false
      - key: GEOTAB_PASSWORD
        sync: false
      - key: GEOTAB_DATABASE
        sync: false
      - key: GEOTAB_SERVER
        sync: false
